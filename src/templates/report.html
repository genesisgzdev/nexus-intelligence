<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Intelligence Report - {{ target }}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
        h1, h2, h3 { color: #bb86fc; }
        .container { max-width: 1200px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; border: 1px solid #333; text-align: left; }
        th { background: #2c2c2c; }
        pre { background: #2a2a2a; padding: 15px; border-radius: 5px; overflow-x: auto; color: #a5d6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nexus Intelligence Report</h1>
        <h2>Target: {{ target }}</h2>
        
        {% for module, result in data.items() %}
            <h3>{{ module | replace('_', ' ') | title }}</h3>
            {% if result.error %}
                <p style="color: #ff5252;">Error: {{ result.error }}</p>
            {% else %}
                <pre>{{ result | pprint }}</pre>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
